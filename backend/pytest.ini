[pytest]
# Run from the backend/ directory:  pytest
#
# pythonpath = .  puts backend/ on sys.path so `import app...` resolves the same
# way it does when the app runs via `uvicorn app.main:app`.
pythonpath = .

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -v --tb=short --strict-markers

# Keep test output readable; the app emits a lot of third-party deprecation noise.
filterwarnings =
    ignore::DeprecationWarning
