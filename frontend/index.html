<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Canonical: fold duplicate hosts (apex, *.vercel.app) into the primary domain -->
    <link rel="canonical" href="https://www.cvisionapp.com/" />

    <!-- Primary Meta -->
    <title>CVision - AI CV Analizi & ATS Resume Checker</title>
    <meta name="description" content="Yapay zeka destekli CV analizi ve ATS resume checker. CV'ni yükle; anında ATS skoru, eksik anahtar kelimeler ve AI iyileştirme önerileri al. Ücretsiz başla." />
    <meta name="keywords" content="AI resume checker, ATS resume checker, AI resume analyzer, CV analizi, ATS skoru, ATS uyumlu CV, yapay zeka CV, özgeçmiş analizi, resume keyword optimization, CV optimization tool" />
    <meta name="author" content="CVision" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook önizlemesi) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CVision - AI Resume Analyzer & ATS Checker" />
    <meta property="og:description" content="Upload your CV for an instant ATS score, keyword-gap analysis, and AI rewrite suggestions. Match it to any job description. Free to start." />
    <meta property="og:image" content="https://www.cvisionapp.com/logo.png" />
    <meta property="og:url" content="https://www.cvisionapp.com/" />
    <meta property="og:site_name" content="CVision" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CVision - AI Resume Analyzer & ATS Checker" />
    <meta name="twitter:description" content="Upload your CV for an instant ATS score, keyword-gap analysis, and AI rewrite suggestions. Match it to any job description. Free to start." />
    <meta name="twitter:image" content="https://www.cvisionapp.com/logo.png" />
    <script>
      (function() {
        try {
          var t = localStorage.getItem('cvision-theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <!-- JSON-LD: Organization + WebSite + WebApplication (the product & pricing) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.cvisionapp.com/#organization",
          "name": "CVision",
          "url": "https://www.cvisionapp.com",
          "logo": "https://www.cvisionapp.com/logo.png",
          "description": "AI-powered CV and resume analysis tool that scores resumes for ATS compatibility and gives personalized, AI-generated improvement suggestions and career matches.",
          "email": "fthctlcm@outlook.com",
          "founder": { "@type": "Person", "name": "Fatih Çatalçam" },
          "areaServed": { "@type": "Place", "name": "Worldwide" }
        },
        {
          "@type": "WebSite",
          "@id": "https://www.cvisionapp.com/#website",
          "name": "CVision",
          "url": "https://www.cvisionapp.com",
          "inLanguage": ["tr", "en"],
          "publisher": { "@id": "https://www.cvisionapp.com/#organization" }
        },
        {
          "@type": "WebApplication",
          "@id": "https://www.cvisionapp.com/#webapp",
          "name": "CVision",
          "url": "https://www.cvisionapp.com",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "inLanguage": ["tr", "en"],
          "description": "Upload a CV to get an instant ATS compatibility score, keyword analysis, AI rewrite suggestions, matching career paths, job-description matching, and AI-generated cover letters.",
          "publisher": { "@id": "https://www.cvisionapp.com/#organization" },
          "featureList": [
            "ATS compatibility score",
            "Keyword and completeness analysis",
            "AI bullet-point rewriting",
            "Full AI summary and suggestions",
            "Job-description matching with gap analysis",
            "AI cover letter generation"
          ],
          "offers": [
            {
              "@type": "Offer",
              "name": "Free",
              "price": "0",
              "priceCurrency": "USD",
              "description": "3 CV analyses per week, ATS compatibility score, basic keyword analysis, career path suggestions."
            },
            {
              "@type": "Offer",
              "name": "Pro",
              "price": "199.99",
              "priceCurrency": "TRY",
              "description": "50 CV analyses per week, full AI suggestion pack, AI bullet-point rewriting, full AI summary report, priority support. Includes 7-day free trial.",
              "eligibleTransactionVolume": {
                "@type": "PriceSpecification",
                "billingDuration": "P1M"
              }
            }
          ]
        }
      ]
    }
    </script>

    <!-- JSON-LD: FAQ (mirrors the visible FAQ section on the homepage) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is CVision?",
          "acceptedAnswer": { "@type": "Answer", "text": "CVision is an AI tool that analyzes your CV and resume. It gives you an ATS compatibility score, flags weak sections, suggests specific fixes, and recommends matching career paths. It works for any industry and is available worldwide." }
        },
        {
          "@type": "Question",
          "name": "How does CVision score my CV?",
          "acceptedAnswer": { "@type": "Answer", "text": "You upload a PDF or TXT file and the AI reads it in seconds. It scores ATS compatibility, keyword coverage, completeness, and experience, then explains each score so you know what to change." }
        },
        {
          "@type": "Question",
          "name": "How much does CVision cost?",
          "acceptedAnswer": { "@type": "Answer", "text": "The Free plan costs $0 and includes 3 analyses per week. The Pro plan is ₺199.99 per month and includes 50 analyses per week plus all AI features. It comes with a 7-day free trial and no credit card is required to start." }
        },
        {
          "@type": "Question",
          "name": "How long does a CV analysis take?",
          "acceptedAnswer": { "@type": "Answer", "text": "Under 30 seconds. You upload your CV and the score and feedback are generated automatically, with no manual review or waiting." }
        },
        {
          "@type": "Question",
          "name": "Do you work in my country?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. CVision runs online and is available in every country. The interface is offered in English and Turkish." }
        },
        {
          "@type": "Question",
          "name": "What file formats can I upload?",
          "acceptedAnswer": { "@type": "Answer", "text": "PDF and TXT files, up to 5MB each. There is nothing to install; everything runs in your browser." }
        },
        {
          "@type": "Question",
          "name": "What is an ATS score?",
          "acceptedAnswer": { "@type": "Answer", "text": "An ATS score measures how well an applicant tracking system can read your CV. Many companies filter resumes with these systems before a person sees them, so a higher score means your CV is more likely to reach a recruiter." }
        },
        {
          "@type": "Question",
          "name": "What makes CVision different from other CV checkers?",
          "acceptedAnswer": { "@type": "Answer", "text": "CVision does not stop at a score. It rewrites your bullet points with AI, matches your CV against a specific job description to show missing keywords, and generates a tailored cover letter, all in one place." }
        },
        {
          "@type": "Question",
          "name": "Why should I check my CV before applying?",
          "acceptedAnswer": { "@type": "Answer", "text": "Most applications are filtered by ATS software and skimmed in seconds by recruiters. Checking your CV first shows you the gaps and fixes them, so you apply with a stronger document." }
        },
        {
          "@type": "Question",
          "name": "How do I match my CV to a specific job posting?",
          "acceptedAnswer": { "@type": "Answer", "text": "Paste or link the job description and CVision compares it to your CV. You get a match score, the keywords you are missing, a gap analysis, and the option to generate a cover letter for that role." }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
